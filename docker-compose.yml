services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ufc_rivals
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
    restart: unless-stopped

  ollama-init:
    image: curlimages/curl
    command: ["/bin/sh", "-c", "sleep 10 && curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"llama3.2:3b\"}'"]
    depends_on:
      ollama:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ufc_rivals
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      OLLAMA_API_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pg_data:
  ollama_data:
